<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box movement from bottom to top</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            background-color: yellow;
            border: 1px solid black;
            width: 100vw;
            height: 100vh;
        }

        .box {
            background-color: blue;
            border: black 1px solid;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px;
            /* animation-name: circle;
            position: relative;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-delay: 1s;
            animation-timing-function:linear; */
            /* animation-direction:; */
            /* display: flex;
            align-content: center;
            justify-content: center; */

            animation: 4s linear 0s infinite alternate sunrise, 24s linear 0s infinite psychedelic;

            position: relative;
    left: 50%;
    margin-left: -50px;

        }




        @keyframes sunrise {
            from {
                transform: translateY(110vh);
            }

            to {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
